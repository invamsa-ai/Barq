<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدخل رمز التحقق</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #fff; }
        
        .container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        
        /* تنسيق الأيقونة */
        .icon-container { margin-bottom: 30px; display: flex; justify-content: center; }
        .sparkle-icon { width: 250px; height: auto; } /* قم بتغيير barq-icon.png لاسم صورتك */

        h1 { font-size: 22px; margin-bottom: 10px; color: #000; }
        p { color: #555; margin-bottom: 30px; font-size: 14px; }
        
        /* مربعات الـ OTP */
        .otp-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .otp-box { width: 45px; height: 55px; border: none; border-radius: 10px; background-color: #f2f2f2; text-align: center; font-size: 20px; outline: none; transition: 0.3s; }
        .otp-box:focus { background-color: #eee; border: 2px solid #FFD700; }
        
        .resend { color: #888; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-container">
        <img src="barq-icon.jpg" alt="Icon" class="sparkle-icon">
    </div>

    <h1>أدخل رمز التحقق</h1>
    <p>تم الإرسال إلى <span id="displayPhone"></span></p>

    <div class="otp-inputs">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
        <input type="number" class="otp-box" maxlength="1">
    </div>

    <div class="resend">
        لم تحصل على رمز؟ <br>
        <a href="#" style="color: #000; font-weight: bold; text-decoration: none;">إعادة إرسال الرمز في 56</a>
    </div>
</div>

<script>
    // 1. عرض الرقم الذي تم جلبه من الصفحة السابقة
    const phone = localStorage.getItem('userPhone');
    if(phone) {
        document.getElementById('displayPhone').innerText = phone;
    }

    // 2. منطق التنقل التلقائي بين المربعات
    const inputs = document.querySelectorAll('.otp-box');
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 1) e.target.value = e.target.value.slice(0, 1);
            if (input.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });
        
        // دعم المسح للخلف
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && input.value === '' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
</script>

</body>
</html>
