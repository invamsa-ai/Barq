<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>تسجيل الدخول - برق | أسرع خدمة توصيل</title>
    <meta name="description" content="سجل دخولك في تطبيق برق واستمتع بتجربة توصيل سريعة وموثوقة. أدخل رقم جوالك للبدء.">
    <meta name="keywords" content="برق, توصيل, تسجيل دخول برق, تطبيق برق, خدمات توصيل">
    <meta name="author" content="Barq App">

    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">

    <style>
        /* --- CSS Style --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            padding: 40px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* الشعار */
        .logo-section {
            margin-top: 60px;
            margin-bottom: 30px;
        }

        .sparkle-logo {
            width: 80px; 
            height: auto;
            display: block;
        }

        /* النصوص */
        .welcome-text h1 {
            font-size: 26px;
            font-weight: 700;
            color: #000;
            margin-bottom: 5px;
            text-align: center;
        }

        .welcome-text p {
            color: #777;
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }

        /* حقل الإدخال */
        .input-group {
            width: 100%;
            border: 2px solid #FFD700; 
            border-radius: 18px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            flex-direction: row;
            transition: border-color 0.3s;
        }

        .country-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 10px;
            border-left: 1px solid #eee;
            margin-left: 12px;
        }

        .flag-icon {
            width: 28px;
            height: 20px;
            object-fit: cover;
            border-radius: 3px;
        }

        .arrow-down {
            font-size: 10px;
            color: #ccc;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: right;
        }

        .input-wrapper label {
            font-size: 11px;
            color: #bbb;
            margin-bottom: 2px;
        }

        .input-wrapper input {
            border: none;
            outline: none;
            font-size: 18px;
            color: #333;
            background: transparent;
            font-weight: 500;
            text-align: right;
        }

        /* روابط وأزرار */
        .referral-section {
            margin-top: 30px;
            width: 100%;
            text-align: center;
        }

        .referral-section a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 15px;
        }

        .bottom-section {
            margin-top: auto;
            width: 100%;
            text-align: center;
            padding-bottom: 30px;
        }

        .terms-text {
            font-size: 12px;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .terms-text span {
            color: #000;
            font-weight: bold;
        }

        .btn-continue {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            background-color: #EAEAEA;
            color: #B0B0B0;
            font-size: 18px;
            font-weight: bold;
            cursor: not-allowed;
            transition: all 0.3s ease;
        }

        .btn-continue.active {
            background-color: #000;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-section">
            <img src="barq.png" alt="شعار تطبيق برق" class="sparkle-logo" id="logoImg">
        </div>

        <div class="welcome-text">
            <h1>هلا فيك في برق</h1>
            <p>الرجاء إدخال رقم الجوال</p>
        </div>

        <div class="input-group">
            <div class="country-selector">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" alt="SA" class="flag-icon">
                <span class="arrow-down">▼</span>
            </div>
            
            <div class="input-wrapper">
                <label>رقم الجوال</label>
                <input type="tel" id="phoneInput" placeholder="05" maxlength="10">
            </div>
        </div>

        <div class="referral-section">
            <a href="#">رمز دعوة من صديق؟</a>
        </div>

        <div class="bottom-section">
            <p class="terms-text">
                من خلال الاستمرار فإنك توافق على <br>
                <span>الشروط والأحكام</span> و <span>سياسات خصوصية البيانات</span>
            </p>
            <button id="submitBtn" class="btn-continue" disabled>استمرار</button>
        </div>
    </div>

    <script>
        const phoneInput = document.getElementById('phoneInput');
        const submitBtn = document.getElementById('submitBtn');

        // منطق تفعيل الزر عند الإدخال
        phoneInput.addEventListener('input', () => {
            if (phoneInput.value.trim().length >= 9) {
                submitBtn.classList.add('active');
                submitBtn.disabled = false;
            } else {
                submitBtn.classList.remove('active');
                submitBtn.disabled = true;
            }
        });

        // منع إدخال غير الأرقام
        phoneInput.addEventListener('keypress', (e) => {
            if (!/[0-9]/.test(e.key)) {
                e.preventDefault();
            }
        });

        // حفظ الرقم والانتقال لصفحة التحقق
        submitBtn.addEventListener('click', () => {
            if (!submitBtn.disabled) {
                localStorage.setItem('userPhone', phoneInput.value);
                window.location.href = 'otp.html';
            }
        });
    </script>

</body>
</html>
